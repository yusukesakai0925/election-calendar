<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本選挙カレンダー</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <h1>🗳️ 日本選挙カレンダー</h1>
      <p class="last-updated">データ最終更新: <span id="last-updated">読み込み中…</span></p>
    </div>
  </header>

  <!-- カウントダウン -->
  <section class="hero">
    <div class="hero-inner">
      <div class="countdown-card" id="countdown-card">
        <p class="countdown-label">次の注目選挙</p>
        <p class="countdown-name" id="countdown-name">読み込み中…</p>
        <div class="countdown-number-row">
          <span class="countdown-days" id="countdown-days">--</span>
          <span class="countdown-unit">日</span>
        </div>
        <p class="countdown-detail" id="countdown-detail"></p>
        <p class="countdown-certainty" id="countdown-certainty"></p>
      </div>

      <!-- 直近の選挙サブカード（3件） -->
      <div class="upcoming-mini" id="upcoming-mini"></div>
    </div>
  </section>

  <!-- フィルター -->
  <section class="filters">
    <div class="filter-inner">
      <div class="filter-group">
        <span class="filter-label">種別</span>
        <button class="filter-btn active" data-level="all">すべて</button>
        <button class="filter-btn" data-level="national">国政</button>
        <button class="filter-btn" data-level="pref">都道府県</button>
        <button class="filter-btn" data-level="city">市・区</button>
        <button class="filter-btn" data-level="town">町・村</button>
        <button class="filter-btn unexpected-btn" data-level="unexpected">⚡ 補選・急選</button>
      </div>
      <label class="show-completed-label">
        <input type="checkbox" id="show-completed">
        終了した選挙も表示
      </label>
    </div>
  </section>

  <!-- メインコンテンツ -->
  <main class="main-content">

    <!-- タイムライン -->
    <div class="timeline-section">
      <div id="timeline">
        <p class="loading-text">選挙データを読み込み中…</p>
      </div>
    </div>

    <!-- 国会日程サイドバー -->
    <aside class="diet-sidebar">
      <h2 class="sidebar-title">🏛️ 国会日程</h2>
      <div id="diet-schedule">
        <p class="loading-text">読み込み中…</p>
      </div>
    </aside>

  </main>

  <footer class="site-footer">
    <p>データはAIによる自動収集です。正確な情報は各選挙管理委員会・総務省でご確認ください。</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
